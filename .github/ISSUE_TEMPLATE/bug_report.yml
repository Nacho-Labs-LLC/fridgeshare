name: Bug report
description: Something isn't working
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you expect, and what actually happened?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      placeholder: "0.1.0 or git SHA"
  - type: input
    id: deploy
    attributes:
      label: Deployment
      placeholder: "Docker Compose, bare Node, etc."
